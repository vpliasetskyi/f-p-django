{% if results %}
<div class="cx-grid">
  {% for item in results %}
  <a href="{% url 'content:detail' item.id %}?type={{ item.contnt_type }}" class="cx-poster">
    {% if item.poster_path %}
      <img src="https://image.tmdb.org/t/p/w500{{ item.poster_path }}" alt="{% firstof item.title item.name %}" loading="lazy">
    {% else %}
      <div class="cx-poster-placeholder">{% firstof item.title item.name %}</div>
    {% endif %}
    {% if item.vote_average %}
    <span class="cx-poster-rating">★ {{ item.vote_average|floatformat:1 }}</span>
    {% endif %}
  </a>
  {% endfor %}
</div>
{% else %}
<p style="color:var(--text-3);text-align:center;padding:60px 0">No results found. Try adjusting your filters.</p>
{% endif %}
