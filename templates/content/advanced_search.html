{% extends 'base.html' %}
{% block title %}Discover — Cinemix{% endblock %}

{% block content %}
<div class="cx-page-head">
  <h1 class="cx-page-title">Discover</h1>
  <p class="cx-page-sub">Filter movies and TV shows by type, year, country, genre, and rating.</p>
</div>

<form hx-post="{% url 'content:discover' %}"
      hx-target="#discover-results"
      hx-swap="innerHTML"
      class="cx-discover-form">
  {% csrf_token %}
  <div>
    <label class="cx-discover-label">Type</label>
    <select name="media_type" class="cx-discover-select">
      <option value="movie" {% if selected_media_type == 'movie' %}selected{% endif %}>Movie</option>
      <option value="tv" {% if selected_media_type == 'tv' %}selected{% endif %}>TV Show</option>
    </select>
  </div>
  <div>
    <label class="cx-discover-label">Year</label>
    <input type="number" name="year" min="1900" max="2030" placeholder="Any" class="cx-discover-input" value="{{ selected_year }}">
  </div>
  <div>
    <label class="cx-discover-label">Country</label>
    <input type="text" name="country" placeholder="e.g. US, KR" maxlength="4" class="cx-discover-input" value="{{ selected_country }}">
  </div>
  <div>
    <label class="cx-discover-label">Genre</label>
    <select name="genre_id" class="cx-discover-select">
      <option value="">Any</option>
      {% for genre in genres %}
      <option value="{{ genre.id }}" {% if selected_genre_id == genre.id|stringformat:"s" %}selected{% endif %}>{{ genre.name }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="cx-discover-label">Min Rating</label>
    <select name="min_rating" class="cx-discover-select">
      <option value="">Any</option>
      <option value="5" {% if selected_min_rating == '5' %}selected{% endif %}>5+</option>
      <option value="6" {% if selected_min_rating == '6' %}selected{% endif %}>6+</option>
      <option value="7" {% if selected_min_rating == '7' %}selected{% endif %}>7+</option>
      <option value="8" {% if selected_min_rating == '8' %}selected{% endif %}>8+</option>
      <option value="9" {% if selected_min_rating == '9' %}selected{% endif %}>9+</option>
    </select>
  </div>
  <div style="align-self:flex-end">
    <button type="submit" class="cx-btn cx-btn-primary" style="width:100%">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      Search
    </button>
  </div>
</form>

<div id="discover-results" class="cx-section" style="padding-top:10px;padding-bottom:80px">
  {% include 'content/partials/discover_results.html' %}
</div>
{% endblock %}
