{% extends 'base.html' %}
{% block title %}Discover – Cinemix{% endblock %}

{% block content %}
<div class="pt-24 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">
    <h1 class="text-3xl font-bold mb-2">Advanced Search</h1>
    <p class="text-gray-400 mb-8">Filter movies and TV shows by year, country, genre, and rating.</p>

    <form hx-post="{% url 'content:discover' %}"
          hx-target="#discover-results"
          hx-indicator="#discover-spinner"
          class="glass-panel rounded-2xl p-6 mb-8 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 items-end">
        {% csrf_token %}

        <div>
            <label class="label pb-1"><span class="label-text text-gray-300 text-xs uppercase tracking-wider">Type</span></label>
            <select name="media_type" class="select select-bordered w-full bg-gray-800 border-gray-700 text-sm">
                <option value="movie">Movie</option>
                <option value="tv">TV Show</option>
            </select>
        </div>

        <div>
            <label class="label pb-1"><span class="label-text text-gray-300 text-xs uppercase tracking-wider">Year</span></label>
            <input type="number" name="year" min="1900" max="2030" placeholder="Any"
                class="input input-bordered w-full bg-gray-800 border-gray-700 text-sm">
        </div>

        <div>
            <label class="label pb-1"><span class="label-text text-gray-300 text-xs uppercase tracking-wider">Country</span></label>
            <input type="text" name="country" placeholder="e.g. US, GB, KR" maxlength="4"
                class="input input-bordered w-full bg-gray-800 border-gray-700 text-sm">
        </div>

        <div>
            <label class="label pb-1"><span class="label-text text-gray-300 text-xs uppercase tracking-wider">Genre</span></label>
            <select name="genre_id" class="select select-bordered w-full bg-gray-800 border-gray-700 text-sm">
                <option value="">Any</option>
                {% for genre in genres %}
                <option value="{{ genre.id }}">{{ genre.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="label pb-1"><span class="label-text text-gray-300 text-xs uppercase tracking-wider">Min Rating</span></label>
            <select name="min_rating" class="select select-bordered w-full bg-gray-800 border-gray-700 text-sm">
                <option value="">Any</option>
                {% for r in "5678" %}
                <option value="{{ r }}">{{ r }}+</option>
                {% endfor %}
                <option value="9">9+</option>
            </select>
        </div>

        <div class="col-span-2 sm:col-span-3 lg:col-span-5 flex justify-end gap-3">
            <span id="discover-spinner" class="loading loading-spinner loading-sm text-primary htmx-indicator"></span>
            <button type="submit" class="btn btn-primary px-8">Search</button>
        </div>
    </form>

    <div id="discover-results">
        {% include 'content/partials/discover_results.html' %}
    </div>
</div>
{% endblock %}
