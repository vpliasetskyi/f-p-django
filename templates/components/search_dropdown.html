{% for item in results %}
<a href="{% url 'content:detail' item.id %}?type={{ item.contnt_type }}" class="cx-search-result">
  <div class="mini-poster">
    {% if item.poster_path %}
      <img src="https://image.tmdb.org/t/p/w92{{ item.poster_path }}" alt="" style="width:100%;height:100%;object-fit:cover">
    {% endif %}
  </div>
  <div class="info">
    <div class="sr-title">{% firstof item.title item.name %}</div>
    <div class="sr-meta">
      <span>{% firstof item.release_date item.first_air_date as rd %}{{ rd|slice:":4" }}</span>
      <span class="type-pill">{{ item.contnt_type }}</span>
    </div>
  </div>
</a>
{% empty %}
<div style="padding:14px;text-align:center;color:var(--text-3);font-size:13px">No results found.</div>
{% endfor %}
