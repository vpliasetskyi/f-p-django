{% if error %}
<p class="text-error">{{ error }}</p>
{% else %}
<p class="font-semibold text-white mb-2">Add to list</p>
{% if user_lists %}
<div class="space-y-1 mb-3 max-h-32 overflow-y-auto">
    {% for lst in user_lists %}
    <form hx-post="{% url 'lists:add_to_list' content_item.pk %}"
          hx-target="closest [x-data]"
          hx-swap="outerHTML">
        {% csrf_token %}
        <input type="hidden" name="list_id" value="{{ lst.pk }}">
        <button type="submit" class="btn btn-ghost btn-xs w-full justify-start text-left text-gray-200 hover:text-white">
            {{ lst.name }}
        </button>
    </form>
    {% endfor %}
</div>
{% endif %}
<form hx-post="{% url 'lists:add_to_list' content_item.pk %}"
      hx-target="closest [x-data]"
      hx-swap="outerHTML"
      class="flex gap-1">
    {% csrf_token %}
    <input type="text" name="list_name" placeholder="New list name…"
        class="input input-xs input-bordered flex-1 bg-gray-800 border-gray-600 text-xs" required>
    <button type="submit" class="btn btn-xs btn-primary">+</button>
</form>
{% endif %}
