{% if error %}
<span style="color:var(--accent-pink);font-size:13px">{{ error }}</span>
{% else %}
<p style="font-weight:600;color:var(--text-1);margin:0 0 8px;font-size:13px">Add to list</p>
{% if user_lists %}
<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px;max-height:128px;overflow-y:auto">
  {% for lst in user_lists %}
  <form hx-post="{% url 'lists:add_to_list' content_item.pk %}"
        hx-target="#add-to-list-feedback"
        hx-swap="innerHTML"
        style="margin:0">
    {% csrf_token %}
    <input type="hidden" name="list_id" value="{{ lst.pk }}">
    <button type="submit"
            style="width:100%;text-align:left;background:none;border:none;padding:5px 8px;border-radius:6px;color:var(--text-2);font-size:12px;cursor:pointer;transition:background 0.15s"
            onmouseover="this.style.background='var(--surface-2)'"
            onmouseout="this.style.background='none'">
      {{ lst.name }}
    </button>
  </form>
  {% endfor %}
</div>
{% endif %}
<form hx-post="{% url 'lists:add_to_list' content_item.pk %}"
      hx-target="#add-to-list-feedback"
      hx-swap="innerHTML"
      style="display:flex;gap:6px;margin:0">
  {% csrf_token %}
  <input type="text" name="list_name" placeholder="New list name…"
         style="flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text-1);font-size:12px;outline:none"
         required>
  <button type="submit"
          style="background:var(--primary);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer">+</button>
</form>
{% endif %}
