<h2 class="cx-cl-popup-title">Edit Item</h2>
<p style="color:var(--text-2);font-size:14px;margin-bottom:20px">{{ list_item.content_item.title }}</p>

<form hx-post="{% url 'lists:custom_list_item_edit' custom_list.pk list_item.pk %}"
      hx-target="#cl-added-items"
      hx-swap="innerHTML"
      hx-encoding="multipart/form-data"
      @submit="$dispatch('close-item-popup')">
  {% csrf_token %}

  <div class="cx-field">
    <label class="cx-field-label">Custom Title <span style="color:var(--text-3);font-weight:400;text-transform:none">(optional)</span></label>
    <input class="cx-input" name="custom_title" value="{{ list_item.custom_title }}"
           placeholder="{{ list_item.content_item.title }}" maxlength="255">
  </div>

  <div class="cx-field">
    <label class="cx-field-label">Custom Poster <span style="color:var(--text-3);font-weight:400;text-transform:none">(optional)</span></label>
    <input class="cx-input" name="custom_poster" type="file" accept="image/*" style="padding:10px 12px">
  </div>

  <div class="cx-field">
    <label class="cx-field-label" style="margin-bottom:10px">Personal Rating</label>
    <div x-data="{ r: {{ watch_item.rating|default:0 }}, h: 0 }" style="display:flex;gap:4px;align-items:center">
      {% for n in "1234567890" %}{% with forloop.counter as n %}
      <span style="width:24px;height:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:transform .1s"
            :style="{ color: (h || r) >= {{ n }} ? 'var(--accent-warm)' : 'var(--text-3)', transform: h === {{ n }} ? 'scale(1.2)' : 'scale(1)' }"
            @mouseenter="h = {{ n }}"
            @mouseleave="h = 0"
            @click="r = {{ n }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </span>
      {% endwith %}{% endfor %}
      <input type="hidden" name="rating" :value="r">
      <span style="font-family:var(--f-mono);font-size:12px;color:var(--text-3);margin-left:8px" x-text="r > 0 ? r + '/10' : 'Not rated'"></span>
    </div>
  </div>

  <div style="display:flex;gap:10px;margin-top:24px">
    <button type="submit" class="cx-btn cx-btn-primary" style="flex:1">Save</button>
    <button type="button" class="cx-btn cx-btn-secondary" @click="$dispatch('close-item-popup')">Cancel</button>
  </div>
</form>
