{% extends 'base.html' %}
{% block title %}Sign In — Cinemix{% endblock %}

{% block content %}
<div class="cx-auth-wrap">
  <div class="cx-auth-card">
    <h1 class="cx-auth-title">Welcome back</h1>
    <p class="cx-auth-sub">
      Don't have an account? <a href="{% url 'signup' %}">Create one</a>
    </p>

    {% if form.errors %}
    <div class="cx-auth-error">Username and password didn't match. Please try again.</div>
    {% endif %}

    <form action="{% url 'login' %}" method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div class="cx-field">
        <label class="cx-field-label" for="id_username">Username</label>
        <input class="cx-input" id="id_username" name="username" type="text" autocomplete="username" required placeholder="your_username">
      </div>

      <div class="cx-field">
        <label class="cx-field-label" for="id_password">Password</label>
        <input class="cx-input" id="id_password" name="password" type="password" autocomplete="current-password" required placeholder="••••••••">
      </div>

      <div class="cx-auth-row">
        <label class="cx-check">
          <input type="checkbox" name="remember-me">
          Remember me
        </label>
      </div>

      <button type="submit" class="cx-auth-submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Sign In
      </button>
    </form>
  </div>
</div>
{% endblock %}
